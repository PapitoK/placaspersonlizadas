<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coisoteca | Validador 1mm</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --red: #D23B40; --cream: #FAF8F5; --charcoal: #231F20; }
        body { font-family: sans-serif; background: var(--cream); text-align: center; padding: 20px; }
        .box { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; border: 1px solid #ddd; }
        .upload-area { border: 2px dashed #ccc; padding: 30px; border-radius: 15px; cursor: pointer; position: relative; }
        #preview-container { width: 100%; aspect-ratio: 5/1; background: #eee; border-radius: 50px; margin: 20px 0; display: none; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #ddd; }
        #preview-img { max-width: 90%; max-height: 80%; }
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 10px; margin: 20px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--red); transition: 0.3s; }
        #status { font-weight: bold; margin: 15px 0; font-size: 14px; }
        #warning-log { font-size: 12px; color: #856404; background: #fff3cd; border-radius: 8px; padding: 10px; display: none; margin-bottom: 10px; text-align: left; }
        #btn-down { background: var(--charcoal); color: white; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; display: none; border: none; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div style="background:var(--red); color:white; font-size:10px; padding:4px 10px; display:inline-block; border-radius:4px; margin-bottom:10px; font-weight:bold;">COISOTECA</div>
    <h2>Validador de Impressão</h2>
    <p style="font-size:12px; color:#666;">Aviso: traços menores que <b>1mm</b> podem não ser impressos corretamente.</p>

    <div class="upload-area" id="drop-zone">
        <input type="file" id="fInput" accept="image/*, application/pdf">
        <strong>Subir arte (25x5cm)</strong>
    </div>

    <div id="preview-container"><img id="preview-img"></div>
    <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>
    
    <div id="status">Aguardando arquivo...</div>
    <div id="warning-log"></div>

    <button id="btn-down">BAIXAR ARQUIVO VALIDADO</button>
    <canvas id="c"></canvas>
</div>

<script>
    const fInput = document.getElementById('fInput');
    const status = document.getElementById('status');
    const warningLog = document.getElementById('warning-log');
    const pBar = document.getElementById('p-bar');
    const pCont = document.getElementById('p-cont');
    const btnDown = document.getElementById('btn-down');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const TARGET_W = 2953; // 25cm @ 300dpi
    const TARGET_H = 591;  // 5cm @ 300dpi
    const MIN_LINE_PX = 11; // Aprox 1mm (12px é 1.01mm)

    fInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        btnDown.style.display = 'none';
        warningLog.style.display = 'none';
        pCont.style.display = 'block';
        updateUI("Processando...", 20, "var(--charcoal)");

        // Lógica de leitura (PDF ou Imagem) idêntica à anterior...
        if (file.type === "application/pdf") {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 4 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            const img = new Image();
            img.onload = () => validateAndProcess(img);
            img.src = canvas.toDataURL();
        } else {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => validateAndProcess(img);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    function updateUI(msg, percent, color) {
        status.innerText = msg;
        status.style.color = color;
        pBar.style.width = percent + '%';
    }

    function validateAndProcess(img) {
        if (Math.abs(img.width - TARGET_W) > 150) {
            updateUI("❌ Tamanho errado. Use 25x5cm em 300DPI.", 100, "red");
            return;
        }

        canvas.width = TARGET_W; canvas.height = TARGET_H;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, TARGET_W, TARGET_H);
        ctx.drawImage(img, 0, 0, TARGET_W, TARGET_H);

        const imgData = ctx.getImageData(0, 0, TARGET_W, TARGET_H);
        const data = imgData.data;
        
        // 1. Aplicar Threshold (Preto e Branco) e Limpar Template Cinza
        for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            const v = avg < 120 ? 0 : 255;
            data[i] = data[i+1] = data[i+2] = v;
        }

        // 2. CHECAGEM DE ESPESSURA (Amostragem Horizontal)
        let thinPoints = 0;
        for (let y = 0; y < TARGET_H; y += 10) { // Pula linhas para performance
            let rowCount = 0;
            for (let x = 0; x < TARGET_W; x++) {
                const idx = (y * TARGET_W + x) * 4;
                if (data[idx] === 0) {
                    rowCount++;
                } else {
                    if (rowCount > 0 && rowCount < MIN_LINE_PX) thinPoints++;
                    rowCount = 0;
                }
            }
        }

        ctx.putImageData(imgData, 0, 0);
        previewImg.src = canvas.toDataURL("image/png");
        previewContainer.style.display = 'flex';

        if (thinPoints > 30) { // Tolerância de ruído
            warningLog.innerHTML = "⚠️ <b>Atenção:</b> Detectamos traços muito finos (menores que 1mm). Eles podem não aparecer na impressão 3D.";
            warningLog.style.display = 'block';
            updateUI("⚠️ Analisado com ressalvas", 100, "#856404");
        } else {
            updateUI("✅ Perfeito para impressão!", 100, "green");
        }
        
        btnDown.style.display = 'block';
    }

    btnDown.onclick = () => {
        const link = document.createElement('a');
        link.download = 'placa-validada-coisoteca.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
</script>
</body>
</html>
