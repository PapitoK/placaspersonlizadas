<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Coisoteca</title>
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D23B40; --cream: #FAF8F5; --charcoal: #231F20; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); text-align: center; padding: 20px; color: var(--charcoal); }
        .box { background: white; max-width: 420px; margin: auto; padding: 35px; border-radius: 20px; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 5px; }
        .upload-area { border: 2px dashed var(--red); border-radius: 12px; padding: 30px; cursor: pointer; position: relative; background: #fff; margin-bottom: 20px; }
        .upload-area input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        #preview { width: 100%; aspect-ratio: 5/1; background: #E8E4E0; border-radius: 100px; margin: 20px 0; display: none; align-items: center; justify-content: center; border: 1px solid #ccc; overflow: hidden; }
        #visual-img { max-width: 85%; max-height: 75%; filter: grayscale(1) contrast(150%); }
        #btn-down { background: var(--charcoal); color: white; padding: 18px; width: 100%; border-radius: 8px; cursor: pointer; display: none; border: none; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; font-size: 13px; font-weight: bold; color: var(--red); }
    </style>
</head>
<body>

<div class="box">
    <div style="background:var(--red); color:white; font-size:10px; padding:4px 10px; display:inline-block; border-radius:4px; margin-bottom:10px; font-weight:bold; letter-spacing:1px;">COISOTECA</div>
    <h1>Placa Pílula</h1>
    <p style="font-size:14px; color:#666; margin-bottom:25px;">Converta sua arte para impressão 3D</p>

    <div class="upload-area">
        <input type="file" id="fInput" accept="image/*">
        <span id="upload-text">Toque para subir imagem</span>
    </div>

    <div id="preview"><img id="visual-img"></div>
    <canvas id="c" style="display:none;"></canvas>
    
    <div id="status">Iniciando motor...</div>
    <button id="btn-down">BAIXAR ARQUIVO SVG</button>
</div>

<script>
    const fInput = document.getElementById('fInput');
    const status = document.getElementById('status');
    const btnDown = document.getElementById('btn-down');
    const preview = document.getElementById('preview');
    const visualImg = document.getElementById('visual-img');
    const canvas = document.getElementById('c');
    let svgStr = "";

    // Garantia de que a biblioteca carregou
    window.onload = () => {
        if (typeof ImageTracer !== 'undefined') {
            status.innerText = "✅ Sistema pronto para uso";
            status.style.color = "#28a745";
        } else {
            status.innerText = "❌ Erro ao carregar motor. Recarregue a página.";
        }
    };

    fInput.onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;

        status.innerText = "⏳ Processando...";
        status.style.color = "var(--red)";
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const ctx = canvas.getContext('2d');
                // Redimensionar para evitar travas
                const maxDim = 1200;
                let w = img.width, h = img.height;
                if(w > maxDim) { h *= (maxDim / w); w = maxDim; }
                canvas.width = w; canvas.height = h;

                // Fundo branco + Imagem
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, w, h);
                ctx.drawImage(img, 0, 0, w, h);
                
                visualImg.src = canvas.toDataURL("image/jpeg");
                preview.style.display = 'flex';
                status.innerText = "⚙️ Gerando vetor...";

                setTimeout(() => {
                    try {
                        // Método robusto: converte via URL da imagem processada
                        ImageTracer.imageToSVG(canvas.toDataURL("image/jpeg"), function(svg) {
                            svgStr = svg;
                            btnDown.style.display = 'block';
                            status.innerText = "✅ Sucesso! Clique em Baixar.";
                            status.style.color = "#28a745";
                        }, { ltres:1, qtres:1, pathomit:10 });
                    } catch(err) {
                        status.innerText = "❌ Erro na conversão.";
                    }
                }, 300);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    btnDown.onclick = function() {
        if(!svgStr) return;
        const blob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'coisoteca-arte-' + Date.now() + '.svg';
        a.click();
    };
</script>
</body>
</html>
