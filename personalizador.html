<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Coisoteca — 25x5cm</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D23B40; --cream: #FAF8F5; --charcoal: #231F20; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); text-align: center; padding: 20px; color: var(--charcoal); }
        .box { background: white; max-width: 500px; margin: auto; padding: 40px; border-radius: 24px; border: 1px solid #ddd; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Área de Drop */
        .upload-area { 
            border: 2px dashed #ccc; border-radius: 16px; padding: 40px 20px; 
            cursor: pointer; position: relative; background: #fff; transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-area.dragover { border-color: var(--red); background: #FFF5F5; }
        .upload-area input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        /* Barra de Progresso */
        .progress-container { width: 100%; background: #eee; height: 12px; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--red); transition: width 0.2s; }
        
        #status-text { font-size: 14px; font-weight: bold; margin-bottom: 10px; min-height: 20px; }
        #btn-down { background: var(--charcoal); color: white; padding: 20px; width: 100%; border-radius: 12px; cursor: pointer; display: none; border: none; font-weight: bold; font-size: 16px; }
        
        .specs { font-size: 12px; color: #888; margin-top: 15px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div style="background:var(--red); color:white; font-size:10px; padding:4px 12px; display:inline-block; border-radius:4px; margin-bottom:15px; font-weight:bold; letter-spacing:1px;">COISOTECA</div>
    <h1 style="font-family:'Syne'; margin-bottom:5px;">Processador de Placa</h1>
    <p style="font-size:14px; color:#666;">A arte deve ter <b>25x5cm (300 DPI)</b></p>

    <div class="upload-area" id="drop-zone">
        <input type="file" id="fInput" accept="image/png, image/jpeg">
        <div id="upload-label"><b>Clique para selecionar</b><br>ou arraste o arquivo aqui</div>
    </div>

    <div id="status-text">Aguardando arquivo...</div>
    
    <div class="progress-container" id="p-cont">
        <div class="progress-bar" id="p-bar"></div>
    </div>

    <button id="btn-down">BAIXAR PNG PRETO E BRANCO</button>
    
    <div class="specs">
        Target: 2953 x 591 pixels (300 DPI)
    </div>

    <canvas id="c"></canvas>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fInput = document.getElementById('fInput');
    const statusText = document.getElementById('status-text');
    const pBar = document.getElementById('p-bar');
    const pCont = document.getElementById('p-cont');
    const btnDown = document.getElementById('btn-down');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Configuração 25x5cm em 300DPI
    const TARGET_W = 2953;
    const TARGET_H = 591;

    // Efeitos de Drag and Drop
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    };
    fInput.onchange = (e) => handleFile(e.target.files[0]);

    function updateProgress(msg, percent, color = "#666") {
        statusText.innerText = msg;
        statusText.style.color = color;
        pCont.style.display = 'block';
        pBar.style.width = percent + '%';
    }

    function handleFile(file) {
        if (!file) return;
        btnDown.style.display = 'none';
        updateProgress("Analisando arquivo...", 20);

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                // Checagem de Tamanho (Aceita margem de erro de 5 pixels)
                const diffW = Math.abs(img.width - TARGET_W);
                const diffH = Math.abs(img.height - TARGET_H);

                if (diffW > 10 || diffH > 10) {
                    updateProgress(`❌ Erro: Tamanho incorreto (${img.width}x${img.height}px). Use 2953x591px.`, 100, "red");
                    return;
                }

                processImage(img);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function processImage(img) {
        updateProgress("Convertendo para Preto e Branco...", 60);
        
        canvas.width = TARGET_W;
        canvas.height = TARGET_H;

        // 1. Desenha fundo branco (limpa transparência)
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Desenha a imagem
        ctx.drawImage(img, 0, 0);

        // 3. Aplica Filtro P&B de Alto Contraste (Threshold)
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
            // Calcula luminosidade simples
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            // Se for mais claro que cinza médio, vira branco. Se for escuro, vira preto.
            const v = avg > 128 ? 255 : 0;
            data[i] = data[i+1] = data[i+2] = v;
        }
        
        ctx.putImageData(imgData, 0, 0);

        setTimeout(() => {
            updateProgress("✅ Arquivo validado e pronto!", 100, "green");
            btnDown.style.display = 'block';
        }, 500);
    }

    btnDown.onclick = () => {
        const link = document.createElement('a');
        link.download = 'placa-coisoteca-final.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
</script>
</body>
</html>
