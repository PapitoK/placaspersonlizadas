<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Pílula — Coisoteca</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/imagetracerjs/1.2.6/imagetracer.min.js"></script>
    <style>
        :root { --red: #D23B40; --charcoal: #231F20; --cream: #FAF8F5; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--cream); color: var(--charcoal); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: #ffffff; width: 100%; max-width: 480px; padding: 35px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.1); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .brand { background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 3px; display: inline-block; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 26px; margin: 0 0 10px 0; }
        .upload-zone { border: 2px dashed var(--red); border-radius: 12px; padding: 40px 20px; cursor: pointer; position: relative; transition: 0.3s; background: #fff; }
        .upload-zone:hover { background: #FFF5F5; }
        .upload-zone input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .preview-area { display: none; margin-top: 30px; }
        .slot { width: 100%; aspect-ratio: 5/1; background: #E8E4E0; border-radius: 100px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px; border: 1px solid #ddd; }
        canvas { max-width: 85%; max-height: 75%; filter: grayscale(1) contrast(150%); }
        .btn-main { background: var(--red); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; display: none; }
        #loading-msg { color: var(--red); font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">Coisoteca</div>
    <h1>Placa Pílula</h1>
    <p style="font-size: 14px; color: #666; margin-bottom: 25px;">Converta sua arte para impressão 3D.</p>

    <div class="upload-zone" id="dropZone">
        <input type="file" id="fInput" accept="image/*">
        <div id="uploadText" style="color: var(--red); font-weight: bold;">Clique para selecionar sua imagem</div>
    </div>

    <div id="pArea" class="preview-area">
        <div class="slot"><canvas id="pCanvas"></canvas></div>
        <div id="sMsg" style="font-size:13px; margin-bottom:15px; padding:10px; border-radius:8px; background: #E8F5EE;">✅ Imagem carregada</div>
        <div id="loading-msg">Vetorizando... por favor aguarde.</div>
        <button id="dBtn" class="btn-main">Baixar Arquivo SVG</button>
    </div>
</div>

<script>
    const fInput = document.getElementById('fInput');
    const pArea = document.getElementById('pArea');
    const pCanvas = document.getElementById('pCanvas');
    const dBtn = document.getElementById('dBtn');
    const loadingMsg = document.getElementById('loading-msg');
    let svgOut = "";

        const file = e.target.files[0];
        if (!file) return;
