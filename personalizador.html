<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Técnico Coisoteca</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --red: #D23B40; --green: #28a745; --cream: #FAF8F5; --charcoal: #231F20; }
        body { font-family: sans-serif; background: var(--cream); padding: 20px; color: var(--charcoal); }
        .box { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* Área de Upload */
        .upload-area { border: 2px dashed #ccc; padding: 30px; border-radius: 15px; cursor: pointer; position: relative; background: #fff; margin-bottom: 20px; }
        .upload-area:hover { border-color: var(--red); }
        input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        /* Lista de Checagem */
        .check-list { text-align: left; margin: 20px 0; padding: 0; list-style: none; }
        .check-item { 
            padding: 12px; margin-bottom: 8px; border-radius: 8px; 
            background: #f9f9f9; display: flex; align-items: center; 
            font-size: 14px; border: 1px solid #eee; transition: 0.3s;
        }
        .check-item b { margin-right: 15px; font-size: 18px; width: 20px; text-align: center; }
        
        /* Cores dos Estados */
        .pending { color: #999; }
        .ok { background: #eeffee; border-color: #ccffcc; color: var(--green); }
        .fail { background: #ffeeee; border-color: #ffcccc; color: var(--red); }
        .warn { background: #fff9e6; border-color: #ffeeb3; color: #856404; }

        #preview-container { width: 100%; aspect-ratio: 5/1; background: #eee; border-radius: 50px; margin: 20px 0; display: none; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #ddd; }
        #preview-img { max-width: 90%; max-height: 80%; }
        #btn-down { background: var(--charcoal); color: white; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; display: none; border: none; font-weight: bold; font-size: 16px; margin-top: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div style="background:var(--red); color:white; font-size:10px; padding:4px 10px; display:inline-block; border-radius:4px; margin-bottom:10px; font-weight:bold;">COISOTECA</div>
    <h2 style="margin-top:0;">Validador de Arte</h2>
    
    <div class="upload-area">
        <input type="file" id="fInput" accept="image/*, application/pdf">
        <strong>Clique ou arraste o arquivo aqui</strong>
    </div>

    <ul class="check-list" id="checkList">
        <li class="check-item pending" id="c-format"><b>○</b> Formato (PDF, PNG ou JPG)</li>
        <li class="check-item pending" id="c-size"><b>○</b> Dimensões (25x5cm / 300 DPI)</li>
        <li class="check-item pending" id="c-color"><b>○</b> Cores (Conversão para P&B)</li>
        <li class="check-item pending" id="c-thick"><b>○</b> Espessura mínima (Traços > 1mm)</li>
    </ul>

    <div id="preview-container"><img id="preview-img"></div>
    <button id="btn-down">BAIXAR ARQUIVO VALIDADO</button>
    <canvas id="c"></canvas>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fInput = document.getElementById('fInput');
    const btnDown = document.getElementById('btn-down');
    const previewImg = document.getElementById('preview-img');
    const previewContainer = document.getElementById('preview-container');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const TARGET_W = 2953; 
    const TARGET_H = 591;
    const MIN_LINE_PX = 11.5; // Espessura de 1mm em pixels

    function updateCheck(id, status, text) {
        const el = document.getElementById(id);
        const icons = { pending: '○', ok: '✅', fail: '❌', warn: '⚠️' };
        el.className = 'check-item ' + status;
        el.innerHTML = `<b>${icons[status]}</b> ${text}`;
    }

    fInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;

        // Reset da interface
        btnDown.style.display = 'none';
        previewContainer.style.display = 'none';
        updateCheck('c-format', 'pending', 'Formato (PDF, PNG ou JPG)');
        updateCheck('c-size', 'pending', 'Dimensões (25x5cm / 300 DPI)');
        updateCheck('c-color', 'pending', 'Cores (Conversão para P&B)');
        updateCheck('c-thick', 'pending', 'Espessura mínima (Traços > 1mm)');

        // 1. Checagem de Formato
        if (["image/png", "image/jpeg", "application/pdf"].includes(file.type)) {
            updateCheck('c-format', 'ok', 'Formato aceito');
        } else {
            updateCheck('c-format', 'fail', 'Formato inválido! Use PDF, PNG ou JPG');
            return;
        }

        // Leitura do arquivo
        if (file.type === "application/pdf") {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 4 });
            canvas.width = viewport.width; canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            const img = new Image();
            img.onload = () => processAll(img);
            img.src = canvas.toDataURL();
        } else {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => processAll(img);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    function processAll(img) {
        // 2. Checagem de Tamanho (Tolerância de 150px para pequenas variações de exportação)
        const isSizeOk = Math.abs(img.width - TARGET_W) < 150 && Math.abs(img.height - TARGET_H) < 150;
        
        if (isSizeOk) {
            updateCheck('c-size', 'ok', `Tamanho correto: 25x5cm`);
        } else {
            updateCheck('c-size', 'fail', `Tamanho errado: ${img.width}x${img.height}px (Use 2953x591px)`);
            return;
        }

        // 3. Processamento de Cores e P&B
        canvas.width = TARGET_W; canvas.height = TARGET_H;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, TARGET_W, TARGET_H);
        ctx.drawImage(img, 0, 0, TARGET_W, TARGET_H);

        const imgData = ctx.getImageData(0, 0, TARGET_W, TARGET_H);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            const v = avg < 120 ? 0 : 255; // Se for escuro vira preto, se for claro vira branco (remove template cinza)
            data[i] = data[i+1] = data[i+2] = v;
        }
        ctx.putImageData(imgData, 0, 0);
        updateCheck('c-color', 'ok', 'Cores convertidas e template removido');

        // 4. Checagem de Espessura (1mm)
        let hasThinLines = false;
        // Varredura por amostragem
        for (let y = 10; y < TARGET_H; y += 30) {
            let blackPixelCount = 0;
            for (let x = 0; x < TARGET_W; x++) {
                const idx = (y * TARGET_W + x) * 4;
                if (data[idx] === 0) {
                    blackPixelCount++;
                } else {
                    if (blackPixelCount > 0 && blackPixelCount < MIN_LINE_PX) {
                        hasThinLines = true;
                        break;
                    }
                    blackPixelCount = 0;
                }
            }
        }

        if (!hasThinLines) {
            updateCheck('c-thick', 'ok', 'Espessura de traços segura (>1mm)');
        } else {
            updateCheck('c-thick', 'warn', 'Traços muito finos detectados (<1mm)');
        }

        // Exibir resultado final
        previewImg.src = canvas.toDataURL("image/png");
        previewContainer.style.display = 'flex';
        btnDown.style.display = 'block';
    }

    btnDown.onclick = () => {
        const link = document.createElement('a');
        link.download = 'arte-validada-coisoteca.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
</script>
</body>
</html>
