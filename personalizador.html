<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Técnico Coisoteca</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --red: #D23B40; --green: #28a745; --cream: #FAF8F5; --charcoal: #231F20; }
        body { font-family: sans-serif; background: var(--cream); padding: 20px; text-align: center; color: var(--charcoal); }
        .box { background: white; max-width: 550px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .upload-area { border: 2px dashed #ccc; padding: 30px; border-radius: 15px; cursor: pointer; position: relative; background: #fff; transition: 0.3s; margin-bottom: 20px; }
        .upload-area.dragover { border-color: var(--red); background: #FFF5F5; transform: scale(1.01); }
        input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .check-list { text-align: left; margin: 20px 0; padding: 0; list-style: none; }
        .check-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; background: #f9f9f9; display: flex; align-items: center; font-size: 14px; border: 1px solid #eee; }
        .check-item b { margin-right: 15px; font-size: 18px; width: 20px; text-align: center; }
        .pending { color: #999; }
        .ok { background: #eeffee; border-color: #ccffcc; color: var(--green); }
        .fail { background: #ffeeee; border-color: #ffcccc; color: var(--red); }

        /* PREVIEW COM ANIMAÇÃO PISCANTE */
        #preview-container { width: 100%; margin: 20px 0; display: none; flex-direction: column; align-items: center; }
        #preview-wrapper { 
            width: 100%; position: relative; 
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: 1px solid #ddd; background: white; overflow: hidden;
        }
        #preview-img-base { width: 100%; display: block; } /* Imagem P&B pura */
        #preview-img-errors { 
            width: 100%; position: absolute; inset: 0; 
            animation: blink 1.2s infinite; /* Animação piscante */
            mix-blend-mode: normal; /* Garante o vermelho sobre o preto */
        }
        .preview-label { font-size: 11px; color: #888; margin-top: 8px; font-weight: bold; text-transform: uppercase; }

        /* Estilos do Botão Inativo/Ativo */
        #btn-down { 
            background: #ccc; color: #666; padding: 18px; 
            width: 100%; border-radius: 12px; cursor: not-allowed; 
            display: none; border: none; font-weight: bold; font-size: 16px; 
            transition: 0.3s;
        }
        #btn-down.active { background: var(--charcoal); color: white; cursor: pointer; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div style="background:var(--red); color:white; font-size:10px; padding:4px 10px; border-radius:4px; margin-bottom:10px; font-weight:bold; display:inline-block;">COISOTECA LAB</div>
    <h2 style="margin-top:0;">Validador de Impressão</h2>
    
    <div class="upload-area" id="drop-zone">
        <input type="file" id="fInput" accept="image/*, application/pdf">
        <strong id="upload-label">Arraste o arquivo ou clique aqui</strong>
    </div>

    <ul class="check-list">
        <li class="check-item pending" id="c-format"><b>○</b> Formato (PDF, PNG ou JPG)</li>
        <li class="check-item pending" id="c-size"><b>○</b> Dimensões (25x5cm)</li>
        <li class="check-item pending" id="c-color"><b>○</b> Cores (Conversão P&B)</li>
        <li class="check-item pending" id="c-thick"><b>○</b> Espessura Mínima (1.0mm)</li>
    </ul>

    <div id="preview-container">
        <div id="preview-wrapper">
            <img id="preview-img-base"> <img id="preview-img-errors"> </div>
        <div class="preview-label" id="preview-msg">Pré-visualização</div>
    </div>

    <button id="btn-down" disabled>AGUARDANDO VALIDAÇÃO...</button>
    <canvas id="c"></canvas>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fInput = document.getElementById('fInput');
    const btnDown = document.getElementById('btn-down');
    const previewWrapper = document.getElementById('preview-wrapper');
    const previewImgBase = document.getElementById('preview-img-base');
    const previewImgErrors = document.getElementById('preview-img-errors');
    const previewContainer = document.getElementById('preview-container');
    const previewMsg = document.getElementById('preview-msg');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const TARGET_W = 2953; 
    const TARGET_H = 591;
    const MIN_LINE_PX = 12;

    // Drag and Drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, e => {e.preventDefault(); e.stopPropagation();}));
    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
    fInput.onchange = e => handleFile(e.target.files[0]);

    function updateCheck(id, status, text) {
        const el = document.getElementById(id);
        const icons = { pending: '○', ok: '✅', fail: '❌' };
        el.className = 'check-item ' + status;
        el.innerHTML = `<b>${icons[status]}</b> ${text}`;
    }

    async function handleFile(file) {
        if (!file) return;

        // Reset
        btnDown.style.display = 'none';
        btnDown.disabled = true;
        btnDown.className = '';
        btnDown.innerText = "AGUARDANDO VALIDAÇÃO...";
        previewContainer.style.display = 'none';
        updateCheck('c-format', 'ok', 'Formato aceito');

        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => processAll(img);
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function processAll(img) {
        // 1. Validar Tamanho
        if (Math.abs(img.width - TARGET_W) > 100) {
            updateCheck('c-size', 'fail', `Tamanho errado: ${img.width}px (Requer 2953px)`);
            return;
        }
        updateCheck('c-size', 'ok', 'Tamanho OK (25x5cm)');

        canvas.width = TARGET_W; canvas.height = TARGET_H;
        ctx.fillStyle = "white"; ctx.fillRect(0, 0, TARGET_W, TARGET_H);
        ctx.drawImage(img, 0, 0, TARGET_W, TARGET_H);

        let imgData = ctx.getImageData(0, 0, TARGET_W, TARGET_H);
        let data = imgData.data;

        // 2. Converter para P&B Puro (Threshold 200)
        for (let i = 0; i < data.length; i += 4) {
            let avg = (data[i] + data[i+1] + data[i+2]) / 3;
            let v = avg < 200 ? 0 : 255;
            data[i] = data[i+1] = data[i+2] = v;
        }
        updateCheck('c-color', 'ok', 'Cores OK');
        ctx.putImageData(imgData, 0, 0); // Salva a imagem P&B pura no canvas de download

        // 3. Gerar Preview com Erros Piscantes
        // Canvas Base (Apenas P&B puro)
        let baseCanvas = document.createElement('canvas');
        baseCanvas.width = TARGET_W; baseCanvas.height = TARGET_H;
        baseCanvas.getContext('2d').putImageData(imgData, 0, 0);

        // Canvas de Erros (Apenas o mapa vermelho com fundo transparente)
        let errorCanvas = document.createElement('canvas');
        errorCanvas.width = TARGET_W; errorCanvas.height = TARGET_H;
        let eCtx = errorCanvas.getContext('2d');
        eCtx.fillStyle = "rgba(210, 59, 64, 1.0)"; // Vermelho Coisoteca Puro

        let hasThinLines = false;
        // Scanner Horizontal e Vertical Unificado
        for (let y = 0; y < TARGET_H; y += 2) {
            let streak = 0;
            for (let x = 0; x < TARGET_W; x++) {
                if (data[(y * TARGET_W + x) * 4] === 0) streak++;
                else {
                    if (streak > 0 && streak < MIN_LINE_PX) {
                        eCtx.fillRect(x - streak, y - 5, streak, 10);
                        hasThinLines = true;
                    }
                    streak = 0;
                }
            }
        }
        for (let x = 0; x < TARGET_W; x += 2) {
            let streak = 0;
            for (let y = 0; y < TARGET_H; y++) {
                if (data[(y * TARGET_W + x) * 4] === 0) streak++;
                else {
                    if (streak > 0 && streak < MIN_LINE_PX) {
                        eCtx.fillRect(x - 5, y - streak, 10, streak);
                        hasThinLines = true;
                    }
                    streak = 0;
                }
            }
        }

        // --- ATUALIZAÇÃO DA INTERFACE ---
        if (hasThinLines) {
            updateCheck('c-thick', 'fail', 'Traços < 1mm detectados');
            previewMsg.innerText = "⚠️ Erros destacados em vermelho (PISCANDO)";
            previewMsg.style.color = "var(--red)";
            
            // Botão inativo (cinza)
            btnDown.innerText = "CORRIJA OS ERROS PARA BAIXAR";
            btnDown.classList.remove('active');
            btnDown.disabled = true;
        } else {
            updateCheck('c-thick', 'ok', 'Espessura aprovada!');
            previewMsg.innerText = "✅ Arte validada com sucesso";
            previewMsg.style.color = "var(--green)";
            
            // Botão ativo (charcoal)
            btnDown.innerText = "BAIXAR PNG PARA IMPRESSÃO";
            btnDown.classList.add('active');
            btnDown.disabled = false;
        }

        // Define as imagens do preview (base e erro sobrepostas)
        previewImgBase.src = baseCanvas.toDataURL("image/png");
        previewImgErrors.src = errorCanvas.toDataURL("image/png"); // Mapa vermelho (fundo transparente)
        previewContainer.style.display = 'flex';
        btnDown.style.display = 'block';

        btnDown.onclick = () => {
            if (btnDown.disabled) return;
            const link = document.createElement('a');
            link.download = 'coisoteca_pronto.png';
            link.href = canvas.toDataURL("image/png"); // Download limpo (canvas original)
            link.click();
        };
    }
</script>
</body>
</html>
