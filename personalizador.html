<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Personalizador Coisoteca</title>
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #FAF8F5; text-align: center; padding: 20px; }
        .box { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 15px; border: 1px solid #ddd; }
        .btn-upload { background: #D23B40; color: white; padding: 15px; border-radius: 8px; cursor: pointer; display: block; font-weight: bold; }
        #fInput { display: none; }
        #preview { width: 100%; aspect-ratio: 5/1; background: #eee; border-radius: 50px; margin: 20px 0; display: none; align-items: center; justify-content: center; }
        canvas { max-width: 90%; max-height: 80%; }
        #btn-down { background: #231F20; color: white; padding: 15px; border-radius: 8px; cursor: pointer; display: none; width: 100%; border: none; font-weight: bold; }
        #status { margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#231F20">Placa Pílula</h2>
    <p style="font-size:13px">Selecione sua arte em preto e branco</p>

    <label for="fInput" class="btn-upload">ESCOLHER IMAGEM</label>
    <input type="file" id="fInput" accept="image/*">

    <div id="preview"><canvas id="c"></canvas></div>
    
    <div id="status">Aguardando motor...</div>
    <button id="btn-down">BAIXAR ARQUIVO SVG</button>
</div>

<script>
    const fInput = document.getElementById('fInput');
    const status = document.getElementById('status');
    const btnDown = document.getElementById('btn-down');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('c');
    let svgStr = "";

    // Verifica se a lib carregou
    window.onload = () => {
        if(typeof ImageTracer !== 'undefined') {
            status.innerText = "✅ Motor pronto";
        } else {
            status.innerText = "❌ Erro ao carregar motor. Atualize a página.";
        }
    };

    fInput.onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;

        status.innerText = "Processando: " + file.name;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                // Desenha preview
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                preview.style.display = 'flex';

                // Converte para SVG
                try {
                    ImageTracer.imageToSVG(event.target.result, function(svg) {
                        svgStr = svg;
                        btnDown.style.display = 'block';
                        status.innerText = "✅ Pronto para baixar!";
                    }, { ltres:1, qtres:1, numberofcolors:2 });
                } catch(err) {
                    status.innerText = "Erro na conversão.";
                }
            };
        };
        reader.readAsDataURL(file);
    };

    btnDown.onclick = function() {
        const blob = new Blob([svgStr], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'coisoteca.svg';
        a.click();
    };
</script>

</body>
</html>
