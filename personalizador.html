<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Coisoteca</title>
    <script src="https://cdn.jsdelivr.net/gh/joshua-gould/imagetracerjs/dist/imagetracer.min.js"></script>
    <style>
        :root { --red: #D23B40; --cream: #FAF8F5; }
        body { font-family: sans-serif; background: var(--cream); text-align: center; padding: 20px; color: #231F20; }
        .box { background: white; max-width: 420px; margin: auto; padding: 30px; border-radius: 20px; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input[type=file] { width: 100%; padding: 20px; border: 2px dashed var(--red); border-radius: 10px; margin-bottom: 20px; cursor: pointer; box-sizing: border-box; }
        #preview { width: 100%; aspect-ratio: 5/1; background: #E8E4E0; border-radius: 50px; margin: 20px 0; display: none; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #ccc; }
        canvas { display: none; } /* Canvas fica escondido, só processa */
        #visual-preview { max-width: 90%; max-height: 80%; }
        #btn-down { background: #231F20; color: white; padding: 18px; width: 100%; border-radius: 8px; cursor: pointer; display: none; border: none; font-weight: bold; font-size: 16px; }
        #status { margin-top: 15px; font-size: 13px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h1 style="font-size: 22px;">Placa Pílula</h1>
    <p style="font-size: 13px; color: #666;">Envie sua arte em preto (PNG ou JPG)</p>

    <input type="file" id="fInput" accept="image/*">

    <div id="preview">
        <img id="visual-preview"> 
    </div>
    
    <canvas id="c"></canvas>
    
    <div id="status">Iniciando sistema...</div>
    <button id="btn-down">BAIXAR ARQUIVO SVG</button>
</div>

<script>
    const fInput = document.getElementById('fInput');
    const status = document.getElementById('status');
    const btnDown = document.getElementById('btn-down');
    const preview = document.getElementById('preview');
    const visualImg = document.getElementById('visual-preview');
    const canvas = document.getElementById('c');
    let svgStr = "";

    window.onload = function() {
        if(typeof ImageTracer !== 'undefined') {
            status.innerText = "✅ Sistema pronto!";
        } else {
            status.innerText = "❌ Erro ao carregar motor. Recarregue.";
        }
    };

    fInput.onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;

        status.innerText = "⏳ Lendo imagem...";
        const reader = new FileReader();

        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const ctx = canvas.getContext('2d');
                
                // Limite de tamanho para não travar o navegador
                const maxDim = 1200;
                let w = img.width;
                let h = img.height;
                if(w > maxDim) { h = h * (maxDim / w); w = maxDim; }

                canvas.width = w;
                canvas.height = h;

                // Desenha fundo branco sólido e a imagem por cima
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, w, h);
                ctx.drawImage(img, 0, 0, w, h);
                
                // Mostra o preview para o usuário
                visualImg.src = canvas.toDataURL("image/jpeg");
                preview.style.display = 'flex';
                status.innerText = "⚙️ Convertendo... aguarde.";

                // Pequeno delay para o navegador processar o visual antes do cálculo pesado
                setTimeout(function() {
                    try {
                        // Transformamos o canvas em uma string de imagem JPG
                        // Isso remove transparência e simplifica os dados para a lib
                        const processedImg = canvas.toDataURL("image/jpeg", 0.8);
                        
                        ImageTracer.imageToSVG(processedImg, function(svg) {
                            svgStr = svg;
                            btnDown.style.display = 'block';
                            status.innerText = "✅ Concluído!";
                        }, 'posterized2'); // 'posterized2' é o modo mais rápido para B&W

                    } catch(err) {
                        status.innerText = "❌ Falha no processamento.";
                        console.error(err);
                    }
                }, 200);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    btnDown.onclick = function() {
        if(!svgStr) return;
        const blob = new Blob([svgStr], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'coisoteca-arte.svg';
        a.click();
    };
</script>
</body>
</html>
