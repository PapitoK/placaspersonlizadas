<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Coisoteca</title>
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #D23B40; --charcoal: #231F20; --cream: #FAF8F5; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); text-align: center; padding: 20px; color: var(--charcoal); }
        .box { background: white; max-width: 450px; margin: auto; padding: 35px; border-radius: 20px; border: 1px solid #ddd; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 10px; }
        
        /* Estilizando o seletor de arquivo real para não falhar */
        input[type=file] {
            width: 100%;
            padding: 20px;
            background: #fff;
            border: 2px dashed var(--red);
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            box-sizing: border-box;
        }

        #preview { 
            width: 100%; 
            aspect-ratio: 5/1; 
            background: #E8E4E0; 
            border-radius: 50px; 
            margin: 20px 0; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            border: 1px solid #ccc;
        }
        
        canvas { max-width: 90%; max-height: 80%; filter: grayscale(1) contrast(150%); }
        
        #btn-down { 
            background: var(--red); 
            color: white; 
            padding: 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            display: none; 
            width: 100%; 
            border: none; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.2s;
        }
        #btn-down:hover { background: #A02C30; }
        
        #status { margin-top: 20px; font-size: 13px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <div style="background:var(--red); color:white; font-size:10px; padding:4px 10px; display:inline-block; border-radius:4px; margin-bottom:10px; font-weight:bold; letter-spacing:1px;">COISOTECA</div>
    <h1>Placa Pílula</h1>
    <p style="font-size:14px; color:#666; margin-bottom:25px;">Escolha sua arte para converter em 3D</p>

    <input type="file" id="fInput" accept="image/*">

    <div id="preview"><canvas id="c"></canvas></div>
    
    <div id="status">Verificando motor...</div>
    <button id="btn-down">BAIXAR ARQUIVO PARA IMPRESSÃO</button>
</div>

<script>
    const fInput = document.getElementById('fInput');
    const status = document.getElementById('status');
    const btnDown = document.getElementById('btn-down');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('c');
    let svgStr = "";

    window.onload = function() {
        if(typeof ImageTracer !== 'undefined') {
            status.innerText = "✅ Sistema pronto para uso";
        } else {
            status.innerText = "❌ Erro no motor. Atualize a página.";
        }
    };

    fInput.onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;

        status.innerText = "⏳ Processando imagem...";
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                preview.style.display = 'flex';

                // Pequeno delay para garantir estabilidade
                setTimeout(function(){
                    try {
                        ImageTracer.imageToSVG(event.target.result, function(svg) {
                            svgStr = svg;
                            btnDown.style.display = 'block';
                            status.innerText = "✅ Conversão concluída!";
                        }, { ltres:1, qtres:1, numberofcolors:2, pathomit:10 });
                    } catch(err) {
                        status.innerText = "❌ Erro na conversão. Use PNG preto e branco.";
                    }
                }, 300);
            };
        };
        reader.readAsDataURL(file);
    };

    btnDown.onclick = function() {
        if(!svgStr) return;
        const blob = new Blob([svgStr], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'arte-coisoteca-pilula.svg';
        a.click();
        status.innerText = "💾 Arquivo baixado!";
    };
</script>

</body>
</html>
