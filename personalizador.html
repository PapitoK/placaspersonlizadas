<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Coisoteca</title>
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer.min.js"></script>
    <style>
        :root { --red: #D23B40; --cream: #FAF8F5; }
        body { font-family: sans-serif; background: var(--cream); text-align: center; padding: 20px; }
        .box { background: white; max-width: 420px; margin: auto; padding: 30px; border-radius: 20px; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input[type=file] { width: 100%; padding: 20px; border: 2px dashed var(--red); border-radius: 10px; margin-bottom: 20px; cursor: pointer; box-sizing: border-box; }
        #preview { width: 100%; aspect-ratio: 5/1; background: #E8E4E0; border-radius: 50px; margin: 20px 0; display: none; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #ccc; }
        canvas { max-width: 90%; max-height: 80%; }
        #btn-down { background: #231F20; color: white; padding: 18px; width: 100%; border-radius: 8px; cursor: pointer; display: none; border: none; font-weight: bold; }
        #status { margin-top: 15px; font-size: 13px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h1 style="font-size: 22px;">Placa Pílula</h1>
    <p style="font-size: 13px; color: #666;">Aceita PNG (Transparente ou Branco)</p>

    <input type="file" id="fInput" accept="image/*">

    <div id="preview"><canvas id="c"></canvas></div>
    
    <div id="status">Verificando motor...</div>
    <button id="btn-down">BAIXAR ARQUIVO SVG</button>
</div>

<script>
    const fInput = document.getElementById('fInput');
    const status = document.getElementById('status');
    const btnDown = document.getElementById('btn-down');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('c');
    let svgStr = "";

    window.onload = () => { if(typeof ImageTracer !== 'undefined') status.innerText = "✅ Sistema pronto"; };

    fInput.onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;

        status.innerText = "⏳ Processando...";
        const reader = new FileReader();

        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;

            img.onload = function() {
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;

                // O PULO DO GATO: Preencher o fundo com Branco antes de desenhar a imagem
                // Isso resolve o problema da transparência (PNG transparente)
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                preview.style.display = 'flex';
                status.innerText = "⚙️ Gerando vetor...";

                // Converter os dados processados do Canvas (em vez do arquivo bruto)
                // Isso garante que o ImageTracer veja apenas Preto e Branco sólidos
                try {
                    const dataUrl = canvas.toDataURL("image/jpeg", 0.9); // Converte para JPG p/ remover transparência
                    
                    ImageTracer.imageToSVG(dataUrl, function(svg) {
                        svgStr = svg;
                        btnDown.style.display = 'block';
                        status.innerText = "✅ Sucesso! Pode baixar.";
                    }, {
                        ltres: 1, qtres: 1, numberofcolors: 2,
                        pal: [{r:0,g:0,b:0,a:255}, {r:255,g:255,b:255,a:255}],
                        pathomit: 20
                    });
                } catch(err) {
                    status.innerText = "❌ Erro na conversão. Tente outra imagem.";
                }
            };
        };
        reader.readAsDataURL(file);
    };

    btnDown.onclick = () => {
        const blob = new Blob([svgStr], {type: 'image/svg+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'coisoteca-pilula.svg';
        a.click();
    };
</script>
</body>
</html>
