<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validador de Impressão — Coisoteca</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #D23B40;
    --charcoal: #231F20;
    --cream: #FAF8F5;
    --cream-dark: #F0EDE8;
    --green: #2D8C5A;
    --green-bg: #edf7f2;
    --red-bg: #fdf0f0;
    --muted: #8a8480;
    --border: #E0DDD8;
    --white: #ffffff;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--charcoal);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px;
  }

  .card {
    background: var(--white);
    width: 100%;
    max-width: 560px;
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.04);
  }

  /* HEADER */
  .card-header {
    background: var(--charcoal);
    padding: 28px 32px;
  }
  .brand-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--red);
    background: rgba(210,59,64,0.12);
    padding: 4px 10px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 12px;
  }
  .card-header h1 {
    font-weight: 300;
    font-size: 26px;
    color: var(--cream);
  }
  .card-header h1 span { color: var(--red); font-weight: 500; }
  .card-header p {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .card-body { padding: 28px 32px; }

  /* DROP ZONE */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    background: var(--cream);
    transition: 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--red); background: var(--red-bg); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  
  .drop-label { font-size: 14px; font-weight: 500; }
  .drop-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* CHECKLIST */
  .check-list { list-style: none; margin: 24px 0; display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    border-radius: 10px; background: var(--cream); border: 1px solid var(--border);
  }
  .check-item.ok { background: var(--green-bg); border-color: #b4dfc7; color: var(--green); }
  .check-item.fail { background: var(--red-bg); border-color: #f4c0c0; color: var(--red); }
  .check-status { width: 20px; height: 20px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; }
  .check-item.ok .check-status { background: var(--green); }
  .check-item.fail .check-status { background: var(--red); }
  .check-status svg { width: 12px; height: 12px; stroke: white; fill: none; stroke-width: 3; }

  /* PREVIEW */
  #preview-section { display: none; margin-top: 20px; }
  .preview-frame {
    border-radius: 10px; border: 1px solid var(--border);
    position: relative; overflow: hidden; background: white;
    aspect-ratio: 5/1;
  }
  #preview-base { width: 100%; display: block; }
  #preview-errors {
    position: absolute; inset: 0; width: 100%;
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* BUTTON */
  #btn-download {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
    text-transform: uppercase; cursor: not-allowed;
    background: var(--cream-dark); color: var(--muted);
    margin-top: 20px; display: none;
  }
  #btn-download.ready { background: var(--charcoal); color: var(--cream); cursor: pointer; }

  canvas { display: none; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="brand-tag">Coisoteca Lab</div>
    <h1>Validador de <span>Impressão</span></h1>
    <p>25×5cm · 300 DPI · P&B · Traço ≥ 1mm</p>
  </div>

  <div class="card-body">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/png,image/jpeg,application/pdf">
      <div class="drop-label" id="drop-label">Arraste o arquivo ou clique aqui</div>
      <div class="drop-sub">PNG, JPG ou PDF</div>
    </div>

    <ul class="check-list">
      <li class="check-item" id="c-format"><div class="check-status"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div><strong>Formato</strong></li>
      <li class="check-item" id="c-size"><div class="check-status"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div><strong>Dimensões (25x5cm)</strong></li>
      <li class="check-item" id="c-color"><div class="check-status"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div><strong>Cores (P&B)</strong></li>
      <li class="check-item" id="c-thick"><div class="check-status"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div><strong>Espessura (1mm)</strong></li>
    </ul>

    <div id="preview-section">
      <div class="preview-frame">
        <img id="preview-base">
        <img id="preview-errors">
      </div>
      <p id="preview-msg" style="font-size: 10px; text-align: center; margin-top: 8px; font-weight: bold;"></p>
    </div>

    <button id="btn-download">Aguardando Validação...</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

  const TARGET_W = 2953;
  const TARGET_H = 591;
  const MIN_LINE_PX = 12;
  const THRESHOLD = 200;

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const btnDownload = document.getElementById('btn-download');
  const previewBase = document.getElementById('preview-base');
  const previewErrors = document.getElementById('preview-errors');
  const previewSection = document.getElementById('preview-section');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  // Drag & Drop
  ['dragover', 'drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }));
  dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  function setCheck(id, state) { document.getElementById(id).className = 'check-item ' + state; }

  async function handleFile(file) {
    if (!file) return;
    document.getElementById('drop-label').textContent = file.name;
    btnDownload.style.display = 'block';
    btnDownload.className = '';
    btnDownload.disabled = true;
    btnDownload.textContent = "PROCESSANDO...";
    
    // CORREÇÃO JPG: Verifica se o tipo contém 'image' ou as extensões
    const type = file.type.toLowerCase();
    const isImage = type.includes('png') || type.includes('jpg') || type.includes('jpeg');
    const isPDF = type === 'application/pdf';

    if (!isImage && !isPDF) {
      setCheck('c-format', 'fail');
      btnDownload.textContent = "FORMATO INVÁLIDO";
      return;
    }
    setCheck('c-format', 'ok');

    let img = new Image();
    if (isPDF) {
      img = await pdfToImage(file);
    } else {
      img = await fileToImage(file);
    }
    processImage(img);
  }

  function fileToImage(file) {
    return new Promise((res) => {
      const reader = new FileReader();
      reader.onload = e => { const i = new Image(); i.onload = () => res(i); i.src = e.target.result; };
      reader.readAsDataURL(file);
    });
  }

  async function pdfToImage(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: TARGET_W / page.getViewport({scale:1}).width });
    const off = document.createElement('canvas');
    off.width = viewport.width; off.height = viewport.height;
    await page.render({ canvasContext: off.getContext('2d'), viewport }).promise;
    const i = new Image();
    return new Promise(res => { i.onload = () => res(i); i.src = off.toDataURL(); });
  }

  function processImage(img) {
    if (Math.abs(img.width - TARGET_W) > 50) {
      setCheck('c-size', 'fail');
      btnDownload.textContent = "DIMENSÕES INCORRETAS";
      return;
    }
    setCheck('c-size', 'ok');

    canvas.width = TARGET_W; canvas.height = TARGET_H;
    ctx.fillStyle = "white"; ctx.fillRect(0,0,TARGET_W, TARGET_H);
    ctx.drawImage(img, 0, 0, TARGET_W, TARGET_H);

    const imgData = ctx.getImageData(0,0,TARGET_W, TARGET_H);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
      const v = (data[i] + data[i+1] + data[i+2])/3 < THRESHOLD ? 0 : 255;
      data[i] = data[i+1] = data[i+2] = v;
    }
    setCheck('c-color', 'ok');
    ctx.putImageData(imgData, 0, 0);

    // Scanner de Erros
    const errCanvas = document.createElement('canvas');
    errCanvas.width = TARGET_W; errCanvas.height = TARGET_H;
    const eCtx = errCanvas.getContext('2d');
    eCtx.fillStyle = "rgba(210, 59, 64, 0.9)";
    let hasError = false;

    for (let y = 0; y < TARGET_H; y += 2) {
      let streak = 0;
      for (let x = 0; x < TARGET_W; x++) {
        if (data[(y * TARGET_W + x) * 4] === 0) streak++;
        else {
          if (streak > 0 && streak < MIN_LINE_PX) { eCtx.fillRect(x - streak, y - 5, streak, 10); hasError = true; }
          streak = 0;
        }
      }
    }
    for (let x = 0; x < TARGET_W; x += 2) {
      let streak = 0;
      for (let y = 0; y < TARGET_H; y++) {
        if (data[(y * TARGET_W + x) * 4] === 0) streak++;
        else {
          if (streak > 0 && streak < MIN_LINE_PX) { eCtx.fillRect(x - 5, y - streak, 10, streak); hasError = true; }
          streak = 0;
        }
      }
    }

    previewBase.src = canvas.toDataURL();
    previewErrors.src = errCanvas.toDataURL();
    previewSection.style.display = 'block';

    if (hasError) {
      setCheck('c-thick', 'fail');
      btnDownload.textContent = "CORRIJA OS ERROS PISCANTES";
      btnDownload.classList.remove('ready');
      btnDownload.disabled = true;
    } else {
      setCheck('c-thick', 'ok');
      btnDownload.textContent = "BAIXAR ARQUIVO VALIDADO";
      btnDownload.classList.add('ready');
      btnDownload.disabled = false;
    }
  }

  btnDownload.onclick = () => {
    if (btnDownload.disabled) return;
    const a = document.createElement('a');
    a.download = 'coisoteca_valido.png';
    a.href = canvas.toDataURL();
    a.click();
  }
</script>
</body>
</html>
